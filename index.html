<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perhitungan di Surat Keterangan Belajar Bahasa Jepang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:30px;
}
.card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    margin-bottom:30px;
}
h1{text-align:center;color:#1e3c72;}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}
input{
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    width:95%;
    margin-bottom:8px;
}
button{
    padding:10px 18px;
    background:#1e3c72;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{background:#16305c;}

.result-table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
.result-table th{
    background:#1e3c72;
    color:white;
    padding:12px;
    text-align:left;
}
.result-table td{
    padding:12px;
    border-bottom:1px solid #eee;
}
.result-table tr:nth-child(even){background:#f9f9f9;}

.days-header{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-weight:500;
    margin-bottom:5px;
}
.days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}
.day{
    padding:8px;
    text-align:center;
    border-radius:6px;
    font-size:12px;
}
.masuk{background:#27ae60;color:white;}
.libur{background:#e74c3c;color:white;}
.alfa{background:#f39c12;color:white;}
.sisa{background:#3498db;color:white;}
.nonaktif{background:#ecf0f1;}
.legend{
    margin-top:10px;
    font-size:13px;
    padding:10px;
    background:#f4f6f9;
    border-radius:8px;
}

/* UI Hari Belajar */
.hari-group{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-top:10px;
}
.hari-item{
    display:flex;
    align-items:center;
    gap:8px;
    background:#f4f6f9;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}
.hari-item:hover{background:#dfe6f3;}
.hari-item input{width:16px;height:16px;}

.action-bar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}
.action-bar button{background:#27ae60;}
.action-bar button:hover{background:#1e8449;}
.action-bar button.btn-pdf{background:#c0392b;}
.action-bar button.btn-pdf:hover{background:#922b21;}

.mode-btn{background:#95a5a6;}
.mode-btn:hover{background:#7f8c8d;}
#modeLiburBtn.mode-active{background:#c0392b;}
#modeAlfaBtn.mode-active{background:#e67e22;}

/* Grid multi-bulan agar kompak (tampilan layar & dasar utk print) */
.cal-grid{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}
.cal-month{
    flex:1 1 300px;
    min-width:260px;
}

</style>
</head>

<body>

<div class="card no-print">
<h1>Perhitungan di Surat Keterangan Belajar Bahasa Jepang</h1>

<div style="margin-bottom:15px;">
<label>Nama Siswa</label>
<input type="text" id="studentName" placeholder="Masukkan nama siswa" style="width:97%;">
</div>

<div class="grid">
<div>
<label>Tanggal Mulai Program</label>
<input type="date" id="startDate">
</div>
<div>
<label>Tanggal Sudah Selesai Belajar</label>
<input type="date" id="finishDate">
</div>
<div>
<label>Tanggal Rencana Akhir Program</label>
<input type="date" id="endDate">
</div>
<div>
<label>Jam per Hari</label>
<input type="number" id="hoursPerDay" value="2">
</div>
</div>

<br>

<label>Hari Belajar:</label>
<div class="hari-group">
  <label class="hari-item"><input type="checkbox" value="1"><span>Senin</span></label>
  <label class="hari-item"><input type="checkbox" value="2"><span>Selasa</span></label>
  <label class="hari-item"><input type="checkbox" value="3"><span>Rabu</span></label>
  <label class="hari-item"><input type="checkbox" value="4"><span>Kamis</span></label>
  <label class="hari-item"><input type="checkbox" value="5"><span>Jumat</span></label>
  <label class="hari-item"><input type="checkbox" value="6"><span>Sabtu</span></label>
  <label class="hari-item"><input type="checkbox" value="0"><span>Minggu</span></label>
</div>

<br><br>

<div class="action-bar">
<button type="button" onclick="tampilkanTanggal()">🔎 Tampilkan Tanggal</button>
</div>

<div class="action-bar no-print" id="modeBar" style="display:none;">
<span style="align-self:center;font-weight:500;">Mode Klik Tanggal:</span>
<button type="button" id="modeLiburBtn" class="mode-btn" onclick="setClickMode('libur')">🔴 Isi Libur</button>
<button type="button" id="modeAlfaBtn" class="mode-btn" onclick="setClickMode('alfa')">🟠 Isi Alfa</button>
<button type="button" class="mode-btn" onclick="setClickMode(null)">✖️ Nonaktifkan Mode</button>
</div>

<br>
<div class="action-bar">
<button type="button" onclick="generateAll()">Hitung & Tampilkan</button>
<button type="button" onclick="downloadPNG()">🖼️ Download PNG</button>
</div>

</div>

<div id="printArea">
<div class="card">
<div id="resultArea"></div>
</div>

<div class="card">
<div id="calendarArea"></div>
</div>
</div>

<footer class="no-print" style="justify-self: center;">
  OGG Staf Indonesia | 
  Versi 2026.03.01
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

function parseLocalDate(value){
    const parts=value.split("-");
    return new Date(parts[0], parts[1]-1, parts[2]);
}

function formatDate(date){
    return date.getFullYear()+"-"+
    String(date.getMonth()+1).padStart(2,"0")+"-"+
    String(date.getDate()).padStart(2,"0");
}

let holidays=[];
let absents=[];

let clickMode=null; // 'libur' | 'alfa' | null

function tampilkanTanggal(){
    const startVal=document.getElementById("startDate").value;
    const finishVal=document.getElementById("finishDate").value;
    const endVal=document.getElementById("endDate").value;

    if(!startVal || !finishVal || !endVal){
        alert("Isi semua tanggal (Mulai Program, Sudah Selesai Belajar, Rencana Akhir Program) terlebih dahulu.");
        return;
    }

    const checkedDays=Array.from(document.querySelectorAll(".hari-item input:checked"))
    .map(cb=>parseInt(cb.value));

    if(checkedDays.length===0){
        alert("Pilih minimal satu Hari Belajar terlebih dahulu.");
        return;
    }

    generateCalendar();
    document.getElementById("modeBar").style.display="flex";
}

function setClickMode(mode){
    clickMode = mode;
    document.getElementById("modeLiburBtn").classList.toggle("mode-active", clickMode==="libur");
    document.getElementById("modeAlfaBtn").classList.toggle("mode-active", clickMode==="alfa");
}

function handleDayClick(str){
    if(!clickMode){
        alert("Pilih dulu mode: 🔴 Isi Libur atau 🟠 Isi Alfa, sebelum klik tanggal.");
        return;
    }

    if(clickMode==="libur"){
        const idx=holidays.findIndex(h=>h.date===str);
        if(idx>-1){
            holidays.splice(idx,1);
        }else{
            absents=absents.filter(a=>a!==str);
            const nama=prompt("Nama hari libur (boleh dikosongkan):","");
            if(nama===null) return;
            holidays.push({date:str, name:nama.trim()});
        }
    }else if(clickMode==="alfa"){
        const idx=absents.indexOf(str);
        if(idx>-1){
            absents.splice(idx,1);
        }else{
            holidays=holidays.filter(h=>h.date!==str);
            absents.push(str);
        }
    }

    generateCalendar();
}

function generateAll(){
    generateSummary();
    generateCalendar();
}

function generateSummary(){

    const start=parseLocalDate(document.getElementById("startDate").value);
    const finish=parseLocalDate(document.getElementById("finishDate").value);
    const end=parseLocalDate(document.getElementById("endDate").value);
    const hoursPerDay=parseFloat(document.getElementById("hoursPerDay").value);

    const checkedDays=Array.from(document.querySelectorAll(".hari-item input:checked"))
    .map(cb=>parseInt(cb.value));

    let totalAll=0;
    let totalDone=0;
    let alfaCount=0;

    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
        const str=formatDate(d);
        const isHoliday=holidays.some(h=>h.date===str);
        const isAbsent=absents.includes(str);

        if(checkedDays.includes(d.getDay()) && !isHoliday){
            totalAll++;
            if(isAbsent) alfaCount++;
            else if(d<=finish) totalDone++;
        }
    }

    const studentName=document.getElementById("studentName").value.trim() || "-";

    const totalRemain=totalAll-totalDone-alfaCount;

    const narasi=`
    <p style="margin-top:20px; line-height:1.6;">
    Sampai dengan tanggal <strong>${formatDate(finish)}</strong>, 
    siswa <strong>${studentName}</strong> telah mengikuti pembelajaran selama 
    <strong>${totalDone} hari</strong> atau 
    <strong>${totalDone*hoursPerDay} jam</strong> 
    dari total keseluruhan program 
    <strong>${totalAll} hari</strong> atau 
    <strong>${totalAll*hoursPerDay} jam</strong>. 
    Sisa pembelajaran adalah 
    <strong>${totalRemain} hari</strong> atau 
    <strong>${totalRemain*hoursPerDay} jam</strong>.
    </p>
    `;

    document.getElementById("resultArea").innerHTML=`
    <table class="result-table">
    <tr><th colspan="2">Rincian Program Pembelajaran</th></tr>
    <tr><td>Nama Siswa</td><td><strong>${studentName}</strong></td></tr>
    <tr><td>Periode Sudah Belajar</td><td>${formatDate(start)} s/d ${formatDate(finish)}</td></tr>
    <tr><td>Periode Program Keseluruhan</td><td>${formatDate(start)} s/d ${formatDate(end)}</td></tr>
    <tr><td>Total Hari Masuk / Total Jam Efektif</td><td><strong>${totalDone} hari / ${totalDone*hoursPerDay} jam</strong></td></tr>
    <tr><td>Total Alfa</td><td><strong>${alfaCount} hari</strong></td></tr>
    <tr><td>Total Libur</td><td><strong>${holidays.length} hari</strong></td></tr>
    <tr><td>Sisa Belajar</td><td><strong>${totalRemain} hari / ${totalRemain*hoursPerDay} jam</strong></td></tr>
    <tr><td>Total Program</td><td><strong>${totalAll} hari / ${totalAll*hoursPerDay} jam</strong></td></tr>
    </table>
    ${narasi}
    `;
}

function generateCalendar(){

    const start=parseLocalDate(document.getElementById("startDate").value);
    const finish=parseLocalDate(document.getElementById("finishDate").value);
    const end=parseLocalDate(document.getElementById("endDate").value);

    const checkedDays=Array.from(document.querySelectorAll(".hari-item input:checked"))
    .map(cb=>parseInt(cb.value));

    const hari=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];

    let calendarHTML="<div class=\"cal-grid\">";
    let current=new Date(start.getFullYear(),start.getMonth(),1);

    while(current<=end){

        const month=current.getMonth();
        const year=current.getFullYear();
        const firstDay=new Date(year,month,1).getDay();
        const daysInMonth=new Date(year,month+1,0).getDate();

        calendarHTML+=`<div class="cal-month">
        <h3>${current.toLocaleString('id-ID',{month:'long'})} ${year}</h3>
        <div class="days-header">${hari.map(h=>`<div>${h}</div>`).join("")}</div>
        <div class="days">`;

        for(let i=0;i<firstDay;i++){ calendarHTML+=`<div></div>`; }

        for(let i=1;i<=daysInMonth;i++){
            const date=new Date(year,month,i);
            const str=formatDate(date);
            let className="nonaktif";
            let clickable=false;

			if(date>=start && date<=end){

				if(holidays.some(h=>h.date===str)){
					className="libur";
					clickable=true;
				}
				else if(absents.includes(str)){
					className="alfa";
					clickable=true;
				}
				else if(checkedDays.includes(date.getDay())){
					clickable=true;
					if(date<=finish){
						className="masuk";      // sudah dijalani
					} else {
						className="sisa";       // belum dijalani (sisa belajar)
					}
				}
			}

            const clickAttr=clickable?` onclick="handleDayClick('${str}')" style="cursor:pointer;"`:"";
            calendarHTML+=`<div class="day ${className}"${clickAttr}>${i}</div>`;
        }

        calendarHTML+=`</div><div class="legend">`;

        holidays.filter(h=>parseLocalDate(h.date).getMonth()===month)
        .forEach(h=>calendarHTML+=`<div>🔴 ${h.date} : ${h.name || "Libur"}</div>`);

        absents.filter(a=>parseLocalDate(a).getMonth()===month)
        .forEach(a=>calendarHTML+=`<div>🟠 ${a} : Alfa</div>`);

        calendarHTML+=`</div></div>`;

        current=new Date(year,month+1,1);
    }

    calendarHTML+="</div>";

    document.getElementById("calendarArea").innerHTML=calendarHTML;
}

/* ================= EXPORT: PNG KUALITAS TINGGI ================= */

async function downloadPNG(){
    const area=document.getElementById("printArea");
    const btns=document.querySelectorAll(".no-print");
    btns.forEach(b=>b.style.display="none");

    try{
        const canvas=await html2canvas(area,{
            scale:3,
            backgroundColor:"#ffffff",
            useCORS:true
        });
        const link=document.createElement("a");
        const studentName=document.getElementById("studentName").value.trim() || "siswa";
        const safeName=studentName.replace(/[^a-z0-9]+/gi,"_");

        const now=new Date();
        const tanggal=now.getFullYear()+
            String(now.getMonth()+1).padStart(2,"0")+
            String(now.getDate()).padStart(2,"0");
        const jam=String(now.getHours()).padStart(2,"0")+"."+
            String(now.getMinutes()).padStart(2,"0");

        link.download=`Hasil_Cek_SuketBelajarBhsJepang_${safeName}_${tanggal}_${jam}.png`;
        link.href=canvas.toDataURL("image/png");
        link.click();
    }catch(err){
        alert("Gagal membuat PNG: "+err.message);
    }finally{
        btns.forEach(b=>b.style.display="");
    }
}

</script>

</body>
</html>
